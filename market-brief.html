<style>
  :root{
    --bg:#FFFFFF; --surface:#F6F7F9; --border:#E8EAED;
    --text:#16181C; --text-soft:#8A8F98; --accent:#B85C08; --accent-soft:#FCF1E1;
    --up:#E5484D; --down:#3B82F6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Pretendard', -apple-system, sans-serif; line-height:1.7; font-size:15px;
  }
  .wrap{ max-width:720px; margin:0 auto; padding:32px 20px 80px; }
  .back{ display:inline-flex; align-items:center; gap:6px; color:var(--text-soft); text-decoration:none; font-size:13px; font-weight:600; margin-bottom:24px; }
  .back:hover{ color:var(--accent); }
  h1{ font-size:24px; font-weight:800; margin:0 0 6px; }
  .lead{ color:var(--text-soft); font-size:14px; margin:0 0 32px; }
  .post-card{
    display:block; border:1px solid var(--border); border-radius:12px; padding:20px 22px;
    text-decoration:none; color:var(--text); margin-bottom:14px; transition:border-color .15s;
  }
  .post-card:hover{ border-color:var(--accent); }
  .post-meta{ font-size:12px; color:var(--text-soft); margin-bottom:8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .post-meta .tag{ background:var(--accent-soft); color:var(--accent); font-weight:700; padding:2px 9px; border-radius:999px; }
  .post-idx{ font-size:12.5px; font-weight:700; }
  .post-idx.up{ color:var(--up); }
  .post-idx.down{ color:var(--down); }
  .post-title{ font-size:16.5px; font-weight:700; margin:0 0 6px; }
  .post-excerpt{ font-size:13.5px; color:var(--text-soft); margin:0; }
  .footer-nav{ margin-top:48px; padding-top:20px; border-top:1px solid var(--border); font-size:12.5px; color:var(--text-soft); display:flex; gap:16px; flex-wrap:wrap; }
  .footer-nav a{ color:var(--text-soft); text-decoration:none; }
  .footer-nav a:hover{ color:var(--accent); }
</style>
</head>
<body>
