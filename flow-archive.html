<div class="wrap">

  <h1>기관·외국인 매매 TOP5 날짜별 조회</h1>
  <p class="lead">날짜를 선택하면 그날의 기관·외국인 순매수·순매도 TOP5를 확인할 수 있어요.</p>

  <div class="date-picker-row">
    <input type="date" id="date-input">
    <button onclick="shiftDate(-1)">← 전날</button>
    <button onclick="shiftDate(1)">다음날 →</button>
    <button onclick="loadToday()">오늘</button>
  </div>

  <div id="capture-area">
    <div class="capture-header">
      <div class="brand-mini">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><g stroke="#0F9B8E" stroke-width="4.2" stroke-linecap="round" fill="none"><path d="M24 27 Q13 25 8 18"/><path d="M22 32 Q9 32 5 32"/><path d="M24 37 Q13 41 9 48"/><path d="M40 27 Q51 25 56 18"/><path d="M42 32 Q55 32 59 32"/><path d="M40 37 Q51 41 55 48"/></g><g stroke="#0F9B8E" stroke-width="3" stroke-linecap="round" fill="none"><path d="M27 11 Q22 4 19 2"/><path d="M37 11 Q42 4 45 2"/></g><circle cx="19" cy="2" r="2.6" fill="#0F9B8E"/><circle cx="45" cy="2" r="2.6" fill="#0F9B8E"/><ellipse cx="32" cy="48.5" rx="13.2" ry="12.6" fill="#0F9B8E"/><circle cx="32" cy="31" r="8.4" fill="#0F9B8E"/><circle cx="32" cy="15" r="8.8" fill="#0F9B8E"/></svg>

    </div>

<script>
const FLOW_ARCHIVE_API_URL = 'https://kemidata-flowarchive-813625362143.asia-northeast3.run.app';

function fmtDateInput(d){ // Date -> 'YYYY-MM-DD'
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtDateLabel(ymd){ // 'YYYYMMDD' -> '2026.07.16'
  return `${ymd.slice(0,4)}.${ymd.slice(4,6)}.${ymd.slice(6,8)}`;
}
function fmtEok(millionWon){ // 백만원(부호있음) -> "+1,234억" / "-987억"
  const num = Number(millionWon);
  if (isNaN(num)) return '-';
  const eokVal = Math.round(num / 100);
  const sign = eokVal > 0 ? '+' : (eokVal < 0 ? '-' : '');
  return sign + Math.abs(eokVal).toLocaleString('ko-KR') + '억';
}

function fmtNum(n){
  const num = Number(n);
  if (isNaN(num)) return '-';
  return num.toLocaleString('ko-KR');
}
function trendSymbol(pct){
  const p = Number(pct);
  if (isNaN(p) || p === 0) return '보합';
  return p > 0 ? '▲' : '▼';
}
function trendColorClass(pct){
  const p = Number(pct);
  if (isNaN(p) || p === 0) return '';
  return p > 0 ? 'up-color' : 'down-color';
}

function buildFlowTable(title, dirClass, dirLabel, rows, amountField){
  const rowsHtml = (rows || []).map((r, i) => {
    const cls = trendColorClass(r.changePct);
    return `
    <tr>
      <td><span class="rank-num">${i+1}</span>${r.name}</td>
      <td class="num-td">${fmtNum(r.price)}</td>
      <td class="num-td ${cls}">${trendSymbol(r.changePct)} ${fmtNum(Math.abs(Number(r.change)))}</td>
      <td class="num-td ${cls}">${trendSymbol(r.changePct)} ${Math.abs(Number(r.changePct)).toFixed(2)}%</td>
      <td class="num-td">${fmtEok(r[amountField])}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="5" style="color:var(--text-soft);">데이터 없음</td></tr>';
  return `
    <div class="flow-block">
      <div class="flow-block-title"><span class="${dirClass}">${title}</span></div>
      <div class="flow-table-scroll">
      <table class="flow-table">
        <thead><tr><th>종목명</th><th class="num-th">현재가</th><th class="num-th">변동금액</th><th class="num-th">등락률</th><th class="num-th">${dirLabel}금액</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      </div>
    </div>`;
}

async function loadFlowArchive(ymd){
  const dateLabel = document.getElementById('capture-date-label');
  const content = document.getElementById('flow-content');
  dateLabel.textContent = fmtDateLabel(ymd);
  content.innerHTML = '<div class="status-note">불러오는 중...</div>';
  try {
    const res = await fetch(`${FLOW_ARCHIVE_API_URL}?date=${ymd}`);
    const json = await res.json();
    if (!json.ok) {
      content.innerHTML = `<div class="status-note">⏰ ${json.error || '해당 날짜 데이터가 없어요.'}</div>`;
      return;
    }
    const d = json.data;
    content.innerHTML = `
      <div class="flow-pair-row">
        ${buildFlowTable('기관 순매수 TOP5', 'dir-buy', '순매수', d.institutionBuyTop5, 'institutionNetBuyAmount')}
        ${buildFlowTable('기관 순매도 TOP5', 'dir-sell', '순매도', d.institutionSellTop5, 'institutionNetBuyAmount')}
      </div>
      <div class="flow-pair-row">
        ${buildFlowTable('외국인 순매수 TOP5', 'dir-buy', '순매수', d.foreignBuyTop5, 'foreignNetBuyAmount')}
        ${buildFlowTable('외국인 순매도 TOP5', 'dir-sell', '순매도', d.foreignSellTop5, 'foreignNetBuyAmount')}
      </div>`;
  } catch (err) {
    console.error(err);
    content.innerHTML = '<div class="status-note">⚠ 불러오는 데 실패했어요.</div>';
  }
}

function loadFromInput(){
  const val = document.getElementById('date-input').value; // 'YYYY-MM-DD'
  if (!val) return;
  loadFlowArchive(val.replace(/-/g, ''));
}
function shiftDate(deltaDays){
  const input = document.getElementById('date-input');
  const cur = input.value ? new Date(input.value + 'T00:00:00') : new Date();
  cur.setDate(cur.getDate() + deltaDays);
  input.value = fmtDateInput(cur);
  loadFromInput();
}
function loadToday(){
  document.getElementById('date-input').value = fmtDateInput(new Date());
  loadFromInput();
}

document.getElementById('date-input').addEventListener('change', loadFromInput);
loadToday();
</script>
